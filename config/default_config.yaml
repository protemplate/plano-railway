# Plano Configuration Template
# =============================
# This file is processed by entrypoint.sh at startup. To customize, fork the
# repo and edit this file directly — no bash editing needed.
#
# Template syntax:
#   # @if VAR              Include block only when env var VAR is non-empty
#   # @if VAR1 && VAR2     Include when both are non-empty
#   # @if V1 && V2!=false  Include when V1 is set and V2 is not "false"
#   # @endif               End conditional block (nestable)
#   # @default provider    Include block only when this is the default provider
#   # @enddefault          End default block
#   {{VAR:-fallback}}      Resolved at startup to env var value or fallback
#   $VAR                   Resolved by Plano at runtime (use for API keys)
#
# Full schema: https://github.com/katanemo/plano/blob/main/config/plano_config_schema.yaml
# Docs: https://docs.planoai.dev

version: v0.1.0

# --- Intelligent Routing ---
# @if PLANO_ROUTING_MODEL
routing:
  model: {{PLANO_ROUTING_MODEL:-Arch-Router}}
  llm_provider: {{PLANO_ROUTING_PROVIDER:-arch-router}}
# @endif

listeners:
  egress_traffic:
    address: 0.0.0.0
    port: {{PORT:-12000}}
    message_format: openai
    timeout: {{PLANO_TIMEOUT:-30s}}

# --- Model Providers ---
# Each provider is included only when its API key env var is set.
# The first provider with a key becomes the default (override with PLANO_DEFAULT_PROVIDER).
model_providers:
# @if OPENAI_API_KEY
  - model: {{PLANO_OPENAI_MODEL:-openai/gpt-4o}}
    access_key: $OPENAI_API_KEY
# @default openai
    default: true
# @enddefault
# @if PLANO_ROUTING_MODEL && PLANO_OPENAI_ROUTING!=false
    routing_preferences:
      - name: openai general
        description: general chat, greetings, casual conversation, creative writing, storytelling
# @endif
# @endif
# @if ANTHROPIC_API_KEY

  - model: {{PLANO_ANTHROPIC_MODEL:-anthropic/claude-sonnet-4-5}}
    access_key: $ANTHROPIC_API_KEY
# @default anthropic
    default: true
# @enddefault
# @if PLANO_ROUTING_MODEL && PLANO_ANTHROPIC_ROUTING!=false
    routing_preferences:
      - name: anthropic coding
        description: code generation, debugging, complex reasoning, technical writing, step-by-step analysis
# @endif
# @endif
# @if GOOGLE_API_KEY

  - model: {{PLANO_GOOGLE_MODEL:-gemini/gemini-2.5-flash}}
    access_key: $GOOGLE_API_KEY
# @default google
    default: true
# @enddefault
# @if PLANO_ROUTING_MODEL && PLANO_GOOGLE_ROUTING!=false
    routing_preferences:
      - name: google knowledge
        description: translation, summarization, research questions, data analysis, math, science, long documents
# @endif
# @endif
# @if GROQ_API_KEY

  - model: {{PLANO_GROQ_MODEL:-groq/llama-3.3-70b-versatile}}
    access_key: $GROQ_API_KEY
# @default groq
    default: true
# @enddefault
# @if PLANO_ROUTING_MODEL && PLANO_GROQ_ROUTING!=false
    routing_preferences:
      - name: groq speed
        description: fast responses, simple questions, quick lookups, brief answers
# @endif
# @endif
# @if MISTRAL_API_KEY

  - model: {{PLANO_MISTRAL_MODEL:-mistral/mistral-large-latest}}
    access_key: $MISTRAL_API_KEY
# @default mistral
    default: true
# @enddefault
# @if PLANO_ROUTING_MODEL && PLANO_MISTRAL_ROUTING!=false
    routing_preferences:
      - name: mistral multilingual
        description: European languages, multilingual tasks, structured JSON output, classification, extraction
# @endif
# @endif
# @if DEEPSEEK_API_KEY

  - model: {{PLANO_DEEPSEEK_MODEL:-deepseek/deepseek-chat}}
    access_key: $DEEPSEEK_API_KEY
# @default deepseek
    default: true
# @enddefault
# @if PLANO_ROUTING_MODEL && PLANO_DEEPSEEK_ROUTING!=false
    routing_preferences:
      - name: deepseek reasoning
        description: Chinese language, mathematical proofs, logic puzzles, algorithmic problems, formal reasoning
# @endif
# @endif
# @if XAI_API_KEY

  - model: {{PLANO_XAI_MODEL:-xai/grok-3}}
    access_key: $XAI_API_KEY
# @default xai
    default: true
# @enddefault
# @if PLANO_ROUTING_MODEL && PLANO_XAI_ROUTING!=false
    routing_preferences:
      - name: xai realtime
        description: current events, trending topics, social media analysis, news, real-time knowledge
# @endif
# @endif
# @if TOGETHER_API_KEY

  - model: {{PLANO_TOGETHER_MODEL:-together_ai/meta-llama/Llama-3.3-70B-Instruct-Turbo}}
    access_key: $TOGETHER_API_KEY
# @default together
    default: true
# @enddefault
# @if PLANO_ROUTING_MODEL && PLANO_TOGETHER_ROUTING!=false
    routing_preferences:
      - name: together open-source
        description: open-ended brainstorming, roleplay, creative fiction, uncensored discussion
# @endif
# @endif

# @if __TRACE_ENABLED__
# --- Tracing ---
tracing:
  random_sampling: {{PLANO_TRACE_SAMPLING:-0}}
# @endif

# --- Rate Limiting (optional) ---
