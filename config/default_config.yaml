# Plano Configuration Template
# =============================
# This file is processed by entrypoint.sh at startup. To customize, fork the
# repo and edit this file directly — no bash editing needed.
#
# Template syntax:
#   # @if VAR              Include block only when env var VAR is non-empty
#   # @if VAR1 && VAR2     Include when both are non-empty
#   # @if V1 && V2!=false  Include when V1 is set and V2 is not "false"
#   # @endif               End conditional block (nestable)
#   # @default provider    Include block only when this is the default provider
#   # @enddefault          End default block
#   {{VAR:-fallback}}      Resolved at startup to env var value or fallback
#   $VAR                   Resolved by Plano at runtime (use for API keys)
#
# Full schema: https://github.com/katanemo/plano/blob/main/config/plano_config_schema.yaml
# Docs: https://docs.planoai.dev

version: v0.1.0

listeners:
  egress_traffic:
    address: 0.0.0.0
    port: {{PORT:-12000}}
    message_format: openai
    timeout: {{PLANO_TIMEOUT:-30s}}

# --- Model Providers ---
# Each provider is included only when its API key env var is set.
# The first provider with a key becomes the default (override with PLANO_DEFAULT_PROVIDER).
model_providers:
# @if OPENAI_API_KEY
  - model: {{PLANO_OPENAI_MODEL:-openai/gpt-5.2}}
    access_key: $OPENAI_API_KEY
# @default openai
    default: true
# @enddefault
# @if PLANO_ROUTING_MODEL && PLANO_OPENAI_ROUTING!=false
    routing_preferences:
      - name: casual chat
        description: casual conversation, greetings, jokes, and small talk
      - name: creative writing
        description: creative writing, storytelling, and content generation
# @endif
# @endif
# @if ANTHROPIC_API_KEY

  - model: {{PLANO_ANTHROPIC_MODEL:-anthropic/claude-opus-4-5}}
    access_key: $ANTHROPIC_API_KEY
# @default anthropic
    default: true
# @enddefault
# @if PLANO_ROUTING_MODEL && PLANO_ANTHROPIC_ROUTING!=false
    routing_preferences:
      - name: code generation
        description: generating code, writing scripts, debugging, and technical documentation
      - name: complex reasoning
        description: deep analysis, step-by-step problem solving, and logical reasoning
# @endif
# @endif
# @if GOOGLE_API_KEY

  - model: {{PLANO_GOOGLE_MODEL:-gemini/gemini-3-pro}}
    access_key: $GOOGLE_API_KEY
# @default google
    default: true
# @enddefault
# @if PLANO_ROUTING_MODEL && PLANO_GOOGLE_ROUTING!=false
    routing_preferences:
      - name: translation
        description: translating text between languages and multilingual content
      - name: research and summarization
        description: summarizing documents, answering research questions, and data analysis
      - name: math and science
        description: solving math problems, scientific calculations, and explaining mathematical concepts
# @endif
# @endif
# @if GROQ_API_KEY

  - model: {{PLANO_GROQ_MODEL:-groq/llama-4-maverick-17b-128e-instruct}}
    access_key: $GROQ_API_KEY
# @default groq
    default: true
# @enddefault
# @if PLANO_ROUTING_MODEL && PLANO_GROQ_ROUTING!=false
    routing_preferences:
      - name: quick answers
        description: simple factual lookups, quick answers, and short responses
# @endif
# @endif
# @if MISTRAL_API_KEY

  - model: {{PLANO_MISTRAL_MODEL:-mistral/mistral-large-latest}}
    access_key: $MISTRAL_API_KEY
# @default mistral
    default: true
# @enddefault
# @if PLANO_ROUTING_MODEL && PLANO_MISTRAL_ROUTING!=false
    routing_preferences:
      - name: multilingual tasks
        description: European language processing, structured JSON output, and text classification
# @endif
# @endif
# @if DEEPSEEK_API_KEY

  - model: {{PLANO_DEEPSEEK_MODEL:-deepseek/deepseek-chat}}
    access_key: $DEEPSEEK_API_KEY
# @default deepseek
    default: true
# @enddefault
# @if PLANO_ROUTING_MODEL && PLANO_DEEPSEEK_ROUTING!=false
    routing_preferences:
      - name: formal reasoning
        description: mathematical proofs, logic puzzles, and algorithmic problem solving
# @endif
# @endif
# @if XAI_API_KEY

  - model: {{PLANO_XAI_MODEL:-xai/grok-3}}
    access_key: $XAI_API_KEY
# @default xai
    default: true
# @enddefault
# @if PLANO_ROUTING_MODEL && PLANO_XAI_ROUTING!=false
    routing_preferences:
      - name: current events
        description: current events, trending topics, news, and real-time knowledge
# @endif
# @endif
# @if TOGETHER_API_KEY

  - model: {{PLANO_TOGETHER_MODEL:-together_ai/meta-llama/Llama-4-Maverick-17B-128E-Instruct-Turbo}}
    access_key: $TOGETHER_API_KEY
# @default together
    default: true
# @enddefault
# @if PLANO_ROUTING_MODEL && PLANO_TOGETHER_ROUTING!=false
    routing_preferences:
      - name: open discussion
        description: open-ended brainstorming, roleplay, and creative fiction
# @endif
# @endif

# --- Intelligent Routing ---
# @if PLANO_ROUTING_MODEL
overrides:
  llm_routing_model: {{PLANO_ROUTING_MODEL:-Arch-Router}}
# @endif

# @if __TRACE_ENABLED__
# --- Tracing ---
tracing:
  random_sampling: {{PLANO_TRACE_SAMPLING:-0}}
# @endif

# --- Rate Limiting (optional) ---
# Uncomment to enable. These lines pass through as-is (no conditional markers needed).
